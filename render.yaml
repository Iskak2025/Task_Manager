services:
  # Backend Service
  - type: web
    name: task-manager-backend
    env: java
    rootDir: Task-Manager
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: jdbcInternalUrl
      - key: DATABASE_USERNAME
        fromDatabase:
          name: task-manager-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: task-manager-db
          property: password
      - key: PORT
        value: 8080

  # Frontend Service
  - type: web
    name: task-manager-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: task-manager-backend
          type: web
          property: host

databases:
  - name: task-manager-db
    plan: free
