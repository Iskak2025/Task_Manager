services:
  # Backend Service (Docker)
  - type: web
    name: task-manager-backend
    env: docker
    rootDir: Task-Manager
    plan: free
    envVars:
      - key: DATABASE_HOST
        fromDatabase:
          name: task-manager-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: task-manager-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: task-manager-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: task-manager-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: task-manager-db
          property: password
      - key: PORT
        value: 8080

  # Frontend Service (Static Site)
  - type: web
    name: task-manager-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # Removed plan: free for static sites as it causes errors
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: task-manager-backend
          type: web
          property: host

databases:
  - name: task-manager-db
    plan: free
